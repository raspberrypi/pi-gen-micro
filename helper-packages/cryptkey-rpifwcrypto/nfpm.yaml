# nfpm configuration file for cryptkey-rpifwcrypto
#
# check https://nfpm.goreleaser.com/configuration for detailed usage
#
name: "cryptkey-rpifwcrypto"
arch: "arm64"
platform: "linux"
version: "1.0.1"
section: "default"
priority: "extra"

maintainer: "Tom Dewey <tom.dewey@raspberrypi.com>"

description: |
  Generates a device-bound cryptographic key by computing an HMAC of the block
  device's unique identifier (CID for MMC/SD, EUI for NVMe, or serial) using
  the Raspberry Pi firmware crypto hardware key slot. Used by cryptroot as the
  primary key source. Requires rpifwcrypto and block-device-id packages.
  USB devices are not supported.

depends: 
  - busybox | coreutils
  - rpifwcrypto
  - block-device-id

contents:
- src: cryptkey-rpifwcrypto
  dst: /usr/bin/cryptkey-rpifwcrypto
  file_info:
    mode: 0755

deb:
  compression: zstd


